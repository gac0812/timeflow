name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: 3.11.15
      - uses: astral-sh/setup-uv@v6
        with:
          version: 0.11.28
          enable-cache: true
          cache-dependency-glob: backend/uv.lock
      - run: uv sync --locked --all-groups
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy
      - run: uv run pytest
      - run: uv build

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.20.2
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm audit --audit-level=moderate
      - run: npx --yes expo-doctor@1.20.1
      - run: npx expo export --platform android --output-dir dist

  containers:
    name: Container validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose --env-file .env.example config
      - run: docker compose --env-file .env.example up --build --detach
      - run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8000/api/v1/health; then
              exit 0
            fi
            sleep 2
          done
          exit 1
      - if: always()
        run: docker compose --env-file .env.example down --volumes
